name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Create .env.local
        run: |
          cat > .env.local << EOF
          VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_CLOUDFLARE_ACCOUNT_ID=${{ secrets.VITE_CLOUDFLARE_ACCOUNT_ID }}
          VITE_R2_BUCKET_NAME=${{ secrets.VITE_R2_BUCKET_NAME }}
          VITE_R2_PUBLIC_URL=${{ secrets.VITE_R2_PUBLIC_URL }}
          VITE_WORKER_URL=${{ secrets.VITE_WORKER_URL }}
          EOF

      - name: Build Project
        run: npm run build

      - name: Deploy to Hostinger FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /public_html/
          dangerous-clean-slate: true
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
